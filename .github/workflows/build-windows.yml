name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Create app config
        shell: bash
        run: |
          cat > src/js/app-config.js << 'EOF'
          const APP_CONFIG = {
            backendUrl: 'BACKEND_URL_PLACEHOLDER',
            apiKey:     'API_KEY_PLACEHOLDER',
          };
          EOF
          sed -i "s|BACKEND_URL_PLACEHOLDER|$APP_BACKEND_URL|g" src/js/app-config.js
          sed -i "s|API_KEY_PLACEHOLDER|$APP_API_KEY|g" src/js/app-config.js
        env:
          APP_BACKEND_URL: ${{ secrets.APP_BACKEND_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload to GitHub Release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Uploading to release ${TAG}"
          gh release upload "${TAG}" \
            "dist/PDF-Health-Check-Setup.exe" \
            "dist/PDF-Health-Check-Setup.exe.blockmap" \
            "dist/latest.yml" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
