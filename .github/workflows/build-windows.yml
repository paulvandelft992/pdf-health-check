name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Verify GH_TOKEN is set
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: GH_TOKEN secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: GH_TOKEN  Value: your GitHub personal access token"
            exit 1
          fi
          echo "GH_TOKEN is set (${#GH_TOKEN} chars)"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build & publish Windows installer
        run: npm run release:win:ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
